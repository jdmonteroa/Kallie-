<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kallie</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=JetBrains+Mono:wght@300;400;500&display=swap"
    rel="stylesheet">

  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <div class="container">

    <header>
      <div class="logo-line">
        <div class="line"></div>
        <h1>Kallie</h1>
        <div class="line"></div>
      </div>

      <p class="subtitle">Sistema de Cifrado & Descifrado — ASCII</p>

      <div class="method-badge caesar" id="modeBadge">
        <span class="dot"></span>
        <span id="badgeText">Módulo: César</span>
      </div>
    </header>

    <div class="card">
      <p class="card-title">✦ Selección de Método</p>

      <div class="method-selector">

        <button class="method-btn caesar-btn active" onclick="setMethod('caesar')" id="btnCaesar">

          <span class="method-name">César</span>
          <span class="method-desc">
            Desplazamiento de N posiciones
          </span>

        </button>

        <button class="method-btn atbash-btn" onclick="setMethod('atbash')" id="btnAtbash">

          <span class="method-name">Atbash</span>
          <span class="method-desc">
            Inversión especular
          </span>

        </button>

      </div>
    </div>

    <div class="card">

      <p class="card-title">✦ Configuración</p>

      <label>Conjunto de caracteres</label>

      <input type="text" id="charset" value="abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789 .,;:!?-_"
        oninput="updateInfo()">

      <div id="shiftGroup">

        <label>Desplazamiento</label>

        <div class="shift-control">

          <button class="shift-btn" onclick="changeShift(-1)">−</button>

          <div class="shift-display" id="shiftDisplay">3</div>

          <button class="shift-btn" onclick="changeShift(1)">+</button>

          <input type="range" id="shiftRange" min="1" max="100" value="3" oninput="syncShift(this.value)">

        </div>

      </div>

    </div>

    <div class="card">

      <p class="card-title">✦ Texto</p>

      <textarea id="inputText" placeholder="Escribe o pega tu mensaje aquí…"></textarea>

      <div class="actions">

        <button class="action-btn btn-encrypt" onclick="process('encrypt')">

          ⬆ Cifrar

        </button>

        <button class="action-btn btn-decrypt" onclick="process('decrypt')">

          ⬇ Descifrar

        </button>

        <button class="action-btn btn-clear" onclick="clearAll()">

          ✕ Limpiar

        </button>

      </div>

      <div class="output-box" id="outputBox">

        <button class="copy-btn" onclick="copyResult()">

          Copiar

        </button>

        <span id="outputText"></span>

      </div>

    </div>

    <footer>
      kallie · ASCII-Based Encryption · César & Atbash
    </footer>

  </div>

  <div class="notif" id="notif"></div>

  <script src="script.js"></script>

</body>

</html>
